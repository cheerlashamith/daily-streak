name: Daily Streak Commit

# ───────────────────────────────────────────────────────────────
# WHEN does this run?
#   - On a schedule (cron) once per day
#   - Manually via the "Run workflow" button (Actions tab)
# Cron is in UTC. "30 0,1,2,3 * * *" means it runs at:
# 00:30, 01:30, 02:30, and 03:30 UTC every day.
# In IST, this is 6:00 AM, 7:00 AM, 8:00 AM, and 9:00 AM.
# ───────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "30 0,1,2,3 * * *"
  workflow_dispatch: {}

# Allow the job to push commits back to the repo
permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run the daily agent
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          # 👇👇👇 REPLACE THESE TWO LINES WITH YOUR OWN GITHUB INFO 👇👇👇
          # So commits count toward YOUR contribution graph (not the bot's).
          # Find your no-reply email at: GitHub > Settings > Emails
          git config user.name  "cheerlashamith"
          git config user.email "chshamith888@gmail.com"
          # 👆👆👆 REPLACE THESE TWO LINES WITH YOUR OWN GITHUB INFO 👆👆👆

          git add -A
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily streak update ($(date -u +'%Y-%m-%d'))"
            git push
          fi
