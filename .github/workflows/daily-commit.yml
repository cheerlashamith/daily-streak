name: Daily Streak Commit

# ───────────────────────────────────────────────────────────────
# WHEN does this run?
#   - On a schedule (cron) 7 times per day, spread across the day
#   - Manually via the "Run workflow" button (Actions tab)
#
# Cron is in UTC.  India (IST) = UTC + 5:30
#
# Schedule (7 commits/day, ~2–3 hour gaps):
#   UTC  00:30  →  IST  06:00 AM   (commit 1 — early morning)
#   UTC  03:00  →  IST  08:30 AM   (commit 2 — morning)
#   UTC  05:30  →  IST  11:00 AM   (commit 3 — late morning)
#   UTC  08:00  →  IST  01:30 PM   (commit 4 — afternoon)
#   UTC  10:30  →  IST  04:00 PM   (commit 5 — evening)
#   UTC  13:00  →  IST  06:30 PM   (commit 6 — late evening)
#   UTC  15:30  →  IST  09:00 PM   (commit 7 — night)
# ───────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "0 3 * * *"
    - cron: "30 5 * * *"
    - cron: "0 8 * * *"
    - cron: "30 10 * * *"
    - cron: "0 13 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch: {}

# Allow the job to push commits back to the repo
permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run the daily agent
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name  "cheerlashamith"
          git config user.email "chshamith888@gmail.com"

          git add -A
          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COMMIT_NUM=$(python -c "
          import json, pathlib
          s = json.loads(pathlib.Path('logs/state.json').read_text())
          print(s.get('daily_commit_number', 1))
          ")
            git commit -m "chore: daily streak update ($(date -u +'%Y-%m-%d')) [commit ${COMMIT_NUM}/7]"
            git push
          fi
