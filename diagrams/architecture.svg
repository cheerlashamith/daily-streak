<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,1 L10,5 L0,9 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="url(#bg)" rx="12"/>
  <text x="350" y="32" font-family="system-ui,sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">System Architecture</text>
  <text x="350" y="52" font-family="system-ui,sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Daily GitHub Streak Agent — Automated Contribution Pipeline</text>

  <!-- Developer Box -->
  <rect x="40" y="90" width="160" height="100" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="120" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">👨‍💻</text>
  <text x="120" y="148" font-family="system-ui,sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle" font-weight="700">Developer</text>
  <text x="120" y="168" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Windows / Mac / Linux</text>
  <text x="120" y="183" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">(Can be OFF)</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="135" x2="245" y2="135" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="222" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">Push</text>

  <!-- GitHub Actions Box -->
  <rect x="250" y="90" width="190" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="120" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">⚙️</text>
  <text x="345" y="148" font-family="system-ui,sans-serif" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="700">GitHub Actions</text>
  <text x="345" y="168" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Cron: 7× daily (UTC)</text>
  <text x="345" y="183" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">ubuntu-latest runner</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="135" x2="485" y2="135" stroke="#3fb950" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="125" font-family="system-ui,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">Run</text>

  <!-- Script Box -->
  <rect x="490" y="90" width="180" height="100" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2" filter="url(#shadow)"/>
  <text x="580" y="120" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle">🐍</text>
  <text x="580" y="148" font-family="system-ui,sans-serif" font-size="14" fill="#f0883e" text-anchor="middle" font-weight="700">update.py</text>
  <text x="580" y="168" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">• Quote rotation (35)</text>
  <text x="580" y="183" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">• State management</text>

  <!-- Labels -->
  <text x="120" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">Local Machine</text>
  <text x="345" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">Cloud Infrastructure</text>
  <text x="580" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#f0883e" text-anchor="middle" font-weight="600">Automation Logic</text>

  <!-- Divider -->
  <line x1="40" y1="225" x2="670" y2="225" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Flow Section -->
  <text x="350" y="255" font-family="system-ui,sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">Commit Flow (per run)</text>

  <!-- Flow boxes -->
  <rect x="50" y="275" width="120" height="45" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="110" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">📝 Update</text>
  <text x="110" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">activity.md</text>

  <line x1="170" y1="297" x2="195" y2="297" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="195,292 205,297 195,302" fill="#58a6ff"/>

  <rect x="205" y="275" width="120" height="45" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="265" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">📊 Update</text>
  <text x="265" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">state.json</text>

  <line x1="325" y1="297" x2="350" y2="297" stroke="#3fb950" stroke-width="2"/>
  <polygon points="350,292 360,297 350,302" fill="#3fb950"/>

  <rect x="360" y="275" width="120" height="45" rx="8" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="420" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">💾 Git</text>
  <text x="420" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">commit</text>

  <line x1="480" y1="297" x2="505" y2="297" stroke="#f0883e" stroke-width="2"/>
  <polygon points="505,292 515,297 505,302" fill="#f0883e"/>

  <rect x="515" y="275" width="140" height="45" rx="8" fill="#0d1117" stroke="#a371f7" stroke-width="1.5"/>
  <text x="585" y="295" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">🚀 Push to</text>
  <text x="585" y="310" font-family="system-ui,sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">origin/main</text>

  <!-- Contribution Graph -->
  <text x="350" y="355" font-family="system-ui,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Output: GitHub Contribution Graph — Each commit = 🟩 green square</text>

  <!-- Mini graph -->
  <g transform="translate(175, 365)">
    <rect x="0" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="14" y="0" width="10" height="10" fill="#238636" rx="2"/>
    <rect x="28" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="42" y="0" width="10" height="10" fill="#26a641" rx="2"/>
    <rect x="56" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="70" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="84" y="0" width="10" height="10" fill="#238636" rx="2"/>
    <rect x="98" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="112" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="126" y="0" width="10" height="10" fill="#26a641" rx="2"/>
    <rect x="140" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="154" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="168" y="0" width="10" height="10" fill="#238636" rx="2"/>
    <rect x="182" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="196" y="0" width="10" height="10" fill="#26a641" rx="2"/>
    <rect x="210" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="224" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="238" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="252" y="0" width="10" height="10" fill="#238636" rx="2"/>
    <rect x="266" y="0" width="10" height="10" fill="#26a641" rx="2"/>
    <rect x="280" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="294" y="0" width="10" height="10" fill="#0e4429" rx="2"/>
    <rect x="308" y="0" width="10" height="10" fill="#39d353" rx="2"/>
    <rect x="322" y="0" width="10" height="10" fill="#238636" rx="2"/>
  </g>
</svg>
