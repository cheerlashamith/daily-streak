<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13111c"/>
      <stop offset="0.5" stop-color="#1a1626"/>
      <stop offset="1" stop-color="#0e0c16"/>
    </linearGradient>

    <!-- Animated sweeping name gradient (purple / pink / cyan / orange) -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a371f7">
        <animate attributeName="stop-color" values="#a371f7;#f778ba;#56d4dd;#ff9e64;#a371f7" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#f778ba">
        <animate attributeName="stop-color" values="#f778ba;#56d4dd;#ff9e64;#a371f7;#f778ba" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#56d4dd">
        <animate attributeName="stop-color" values="#56d4dd;#ff9e64;#a371f7;#f778ba;#56d4dd" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a371f7"/>
      <stop offset="0.5" stop-color="#f778ba"/>
      <stop offset="1" stop-color="#56d4dd"/>
    </linearGradient>

    <!-- Shimmer for the sweeping light bar -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <clipPath id="card"><rect x="2" y="2" width="796" height="236" rx="22"/></clipPath>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="796" height="236" rx="22" fill="url(#bg)" stroke="#2a2438" stroke-width="2"/>

  <!-- Animated glowing border -->
  <rect x="6" y="6" width="788" height="228" rx="20" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.6"
        stroke-dasharray="120 2200" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-2320" dur="5s" repeatCount="indefinite"/>
  </rect>

  <g clip-path="url(#card)">
    <!-- Floating background blobs -->
    <circle cx="690" cy="40" r="120" fill="#a371f7" opacity="0.12" filter="url(#softGlow)">
      <animate attributeName="cy" values="40;70;40" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="220" r="140" fill="#f778ba" opacity="0.10" filter="url(#softGlow)">
      <animate attributeName="cy" values="220;185;220" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="200" r="90" fill="#56d4dd" opacity="0.08" filter="url(#softGlow)">
      <animate attributeName="cx" values="560;600;560" dur="9s" repeatCount="indefinite"/>
    </circle>

    <!-- Animated dots strip (lights up in sequence, multi-color) -->
    <g>
      <rect x="430" y="36" width="13" height="13" rx="3" fill="#a371f7" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="448" y="36" width="13" height="13" rx="3" fill="#b681f5" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="466" y="36" width="13" height="13" rx="3" fill="#d07ae0" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="484" y="36" width="13" height="13" rx="3" fill="#f778ba" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></rect>
      <rect x="502" y="36" width="13" height="13" rx="3" fill="#f58aa0" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></rect>
      <rect x="520" y="36" width="13" height="13" rx="3" fill="#ff9e64" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.0s" repeatCount="indefinite"/></rect>
      <rect x="538" y="36" width="13" height="13" rx="3" fill="#9cc6e0" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></rect>
      <rect x="556" y="36" width="13" height="13" rx="3" fill="#56d4dd" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.4s" repeatCount="indefinite"/></rect>
      <rect x="574" y="36" width="13" height="13" rx="3" fill="#79c0d8" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.6s" repeatCount="indefinite"/></rect>
      <rect x="592" y="36" width="13" height="13" rx="3" fill="#a371f7" opacity="0.25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.8s" repeatCount="indefinite"/></rect>
    </g>

    <!-- Avatar -->
    <g transform="translate(120,120)">
      <!-- pulsing halo -->
      <circle r="62" fill="#a371f7" opacity="0.20" filter="url(#softGlow)">
        <animate attributeName="r" values="58;68;58" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.10;0.30;0.10" dur="3s" repeatCount="indefinite"/>
      </circle>
      <!-- rotating ring -->
      <circle r="54" fill="none" stroke="url(#ring)" stroke-width="4" stroke-dasharray="170 70" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle r="46" fill="#130f1e" stroke="#2a2438" stroke-width="2"/>
      <text y="15" text-anchor="middle" font-size="38" font-weight="800" fill="#f778ba">CS</text>
      <text y="15" text-anchor="middle" font-size="38" font-weight="800" fill="url(#nameGrad)" filter="url(#glow)">CS</text>
    </g>

    <!-- Text block -->
    <text x="208" y="86" fill="#9a8fb0" font-size="16" font-weight="600" letter-spacing="3">CRAFTED ONE COMMIT AT A TIME BY</text>

    <!-- solid base name (always visible) + animated gradient overlay on top -->
    <text x="206" y="142" font-size="50" font-weight="800" fill="#a371f7">Cheerla Shamith</text>
    <text x="206" y="142" font-size="50" font-weight="800" fill="url(#nameGrad)" filter="url(#glow)">Cheerla Shamith</text>

    <text x="208" y="178" font-size="16" font-weight="600" letter-spacing="0.5"><tspan fill="#a371f7">Daily GitHub Streak Agent</tspan><tspan fill="#6e6480">  ·  </tspan><tspan fill="#a371f7">Automated</tspan><tspan fill="#6e6480">  ·  </tspan><tspan fill="#a371f7">100% Free</tspan></text>

    <!-- bottom accent line that draws in -->
    <line x1="208" y1="196" x2="600" y2="196" stroke="url(#ring)" stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="392" stroke-dashoffset="392" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="392;0;0;392" dur="6s" repeatCount="indefinite"/>
    </line>

    <!-- sweeping shine over whole card -->
    <rect x="-300" y="0" width="240" height="240" fill="url(#shine)" transform="skewX(-18)">
      <animate attributeName="x" from="-300" to="1100" dur="4.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
